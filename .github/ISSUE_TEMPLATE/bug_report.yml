name: Bug report
description: Report a reproducible problem
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Remove real names, birth data and other personal information before submitting.
  - type: input
    id: version
    attributes:
      label: App version or commit
      placeholder: v0.1.0 or commit hash
    validations:
      required: true
  - type: input
    id: system
    attributes:
      label: macOS and Mac
      placeholder: macOS 26.0, Apple Silicon
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open...
        2. Select...
        3. Observe...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected result
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual result
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: For calculation differences, state the convention or source used. Attach only redacted screenshots.
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I removed personal or identifying birth information.
          required: true
